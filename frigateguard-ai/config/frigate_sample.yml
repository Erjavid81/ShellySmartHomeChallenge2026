# FrigateGuard AI — Frigate NVR v0.17 sample configuration
# Adapt IPs, credentials, and camera names to your setup.
# Place this at: /your/frigate/config/config.yml

mqtt:
  enabled: true
  host: 192.168.1.222       # Your MQTT broker IP
  port: 1883
  topic_prefix: frigate
  user: mqtt_user
  password: mqtt_pass

# Global Hardware Accelerated Enrichments (New in v0.17)
face_recognition:
  enabled: true             # Global toggle for native face recognition
  detection_threshold: 0.7  # Default threshold before running recognition

lpr:
  enabled: true             # Global toggle for native License Plate Recognition

detectors:
  cpu:
    type: cpu

cameras:
  front_door:
    ffmpeg:
      inputs:
        - path: rtsp://user:pass@192.168.1.10:554/stream1
          roles: [detect]
    detect:
      enabled: true
      width: 1920
      height: 1080
      fps: 5
    objects:
      # CRITICAL FOR v0.17: You must track 'face' attribute along with 'person'
      track: 
        - person
        - face
      filters:
        person:
          min_score: 0.7
          threshold: 0.8
    face_recognition:
      enabled: true
      min_area: 5000          # Minimum face pixel area to process
    # Define detection zones to reduce false positives
    zones:
      entrance:
        coordinates: 0,0,1920,1080
    record:
      enabled: false          # FrigateGuard uses detection only, not recording

  driveway:
    ffmpeg:
      inputs:
        - path: rtsp://user:pass@192.168.1.11:554/stream1
          roles: [detect]
    detect:
      enabled: true
      width: 1920
      height: 1080
      fps: 5
    objects:
      # CRITICAL FOR v0.17: You must track 'license_plate' attribute along with 'car'
      track: 
        - car
        - license_plate
    lpr:
      enabled: true
    record:
      enabled: false
